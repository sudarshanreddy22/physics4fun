<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Physics4Fun | Light - PYQs</title>

<style>
body{
font-family:Segoe UI;
background:#f5f7fb;
margin:0;
}

.container{
max-width:950px;
margin:auto;
padding:20px;
}

.chapter-title{
background:#2563eb;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:600;
}

/* TABS */
.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin:20px 0;
}

.tab{
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-weight:600;
background:#e5e7eb;
transition:0.3s;
}

.tab.active{
background:#2563eb;
color:white;
}

.tab:active{
transform:scale(0.95);
}

/* SECTIONS */
.section{
display:none;
opacity:0;
transform:translateY(10px);
transition:0.3s;
}

.section.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* CARD */
.card{
display:flex;
gap:12px;
background:white;
padding:14px;
border-radius:12px;
margin-bottom:10px;
opacity:0;
transform:translateY(20px);
animation:fadeUp 0.5s ease forwards;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* NUMBER */
.qno{
background:#7c3aed;
color:white;
width:26px;
height:26px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* BADGES */
.badges{
margin-left:auto;
display:flex;
gap:6px;
}

.set{
background:#8A244B;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.year{
background:#F63049;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

/* OPTIONS */
.options{
margin-top:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

.option{
padding:8px;
border:1px solid #ccc;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#eff6ff;
transform:scale(1.03);
}
</style>
</head>

<body>

<div class="container">

<div class="chapter-title">Light - Reflection & Refraction</div>

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="show('mcq',this)">MCQ</div>
<div class="tab" onclick="show('two',this)">2M</div>
<div class="tab" onclick="show('three',this)">3M</div>
<div class="tab" onclick="show('four',this)">4M</div>
<div class="tab" onclick="show('five',this)">5M</div>
</div>

<!-- SECTIONS -->
<div id="mcq" class="section active"><div id="mcq-container"></div></div>
<div id="two" class="section"><div id="two-container"></div></div>
<div id="three" class="section"><div id="three-container"></div></div>
<div id="four" class="section"><div id="four-container"></div></div>
<div id="five" class="section"><div id="five-container"></div></div>

</div>

<!-- LOAD DATA FILES -->
<script src="../data/light/mcq.js"></script>
<script src="../data/light/twoMarks.js"></script>
<script src="../data/light/threeMarks.js"></script>
<script src="../data/light/fourMarks.js"></script>
<script src="../data/light/fiveMarks.js"></script>

<script>

/* TAB SWITCH */
function show(id,el){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.getElementById(id).classList.add("active");
el.classList.add("active");
}

/* LOAD MCQ */
function loadMCQ(){
let c=document.getElementById("mcq-container");

mcqs.forEach((q,index)=>{
c.innerHTML+=`
<div class="card" style="animation-delay:${index*0.08}s">

<div class="qno"></div>

<div style="flex:1">
${q.q}

<div class="options">
${q.options.map((o,i)=>`<div class="option">${String.fromCharCode(65+i)}. ${o}</div>`).join("")}
</div>

</div>

<div class="badges">
<div class="set">${q.set}</div>
<div class="year">${q.year}</div>
</div>

</div>
`;
});
}

/* GENERIC LOADER */
function loadData(data,containerId){
let c=document.getElementById(containerId);

data.forEach((q,index)=>{
c.innerHTML+=`
<div class="card" style="animation-delay:${index*0.08}s">

<div class="qno"></div>

<div style="flex:1">
${q.q}
</div>

<div class="badges">
<div class="set">${q.set}</div>
<div class="year">${q.year}</div>
</div>

</div>
`;
});
}

/* CALL */
loadMCQ();
loadData(twoMarks,"two-container");
loadData(threeMarks,"three-container");
loadData(fourMarks,"four-container");
loadData(fiveMarks,"five-container");

</script>

</body>
</html>
