<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics4Fun | Light - Reflection and Refraction</title>

<style>

/* GENERAL */

body{
font-family:Segoe UI,Arial;
background:#f5f7fb;
margin:0;
}

.container{
max-width:950px;
margin:auto;
padding:20px;
}

.chapter-title{
background:#2563eb;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
font-size:20px;
font-weight:600;
}

/* TABS */

.tabs{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin:20px 0;
}

.tab-link{
display:flex;
align-items:center;
gap:8px;
padding:7px 12px;
border-radius:14px;
cursor:pointer;
font-weight:600;
}

.tab-link.active-tab{
background:#2563eb !important;
color:white !important;
}

.circle{
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:700;
}

/* SECTIONS */

.section{
display:none;
margin-top:10px;
}

.section.active{
display:block;
}

/* QUESTION CARD */

.question-item,.mcq-card{
display:flex;
gap:12px;
align-items:flex-start;
background:white;
padding:14px;
border-radius:12px;
margin-bottom:10px;
}

.qno{
width:26px;
height:26px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:13px;
flex-shrink:0;
}

/* BADGES */

.set-badge{
font-size:12px;
font-weight:700;
padding:4px 12px;
border-radius:999px;
background:#8A244B;
color:white;
letter-spacing:0.4px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.year-badge{
font-size:12px;
font-weight:700;
padding:4px 12px;
border-radius:999px;
background:#F63049;
color:white;
letter-spacing:0.4px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

/* OPTIONS */

.options{
margin-top:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.options.ar{
grid-template-columns:repeat(4,1fr);
}

.option{
border:2px solid #e5e7eb;
border-radius:10px;
padding:10px 14px;
cursor:pointer;
background:#fafafa;
display:flex;
align-items:center;
justify-content:flex-start;
gap:10px;
}

.option:hover{
border-color:#2563eb;
background:#eff6ff;
}

.opt-label{
display:flex;
width:26px;
height:26px;
border-radius:50%;
background:#e5e7eb;
align-items:center;
justify-content:center;
font-weight:700;
flex-shrink:0;
}

/* ANSWER COLOURS */

.option.correct{
background:#dcfce7;
border-color:#22c55e;
}

.option.wrong{
background:#fee2e2;
border-color:#ef4444;
}

.option.correct .opt-label{
background:#22c55e;
color:white;
}

.option.wrong .opt-label{
background:#ef4444;
color:white;
}

.options.answered .option{
pointer-events:none;
}

/* EXPLANATION */

.explanation{
display:none;
margin-top:12px;
padding:12px;
background:#f1f5ff;
border-left:4px solid #2563eb;
border-radius:6px;
font-size:14px;
}

/* CATEGORY COLOURS */

.qno.mcq{background:#7c3aed;}
.qno.ar{background:#f97316;}
.qno.two{background:#16a34a;}
.qno.three{background:#dc2626;}
.qno.four{background:#0ea5e9;}
.qno.five{background:#ec4899;}


/* ===== AUTO QUESTION NUMBERING ===== */

.section{
counter-reset: question;
}

.qno::before{
counter-increment: question;
content: counter(question);
}

</style>
</head>

<body>

<div class="container">

<div class="chapter-title">
Light - Reflection and Refraction
</div>

<!-- TABS -->

<div class="tabs">

<div onclick="showSection('mcq',this)" class="tab-link active-tab" style="background:#ede9fe;color:#5b21b6;">
<div class="circle" style="background:#7c3aed;">1</div> MCQs
</div>

<div onclick="showSection('ar',this)" class="tab-link" style="background:#fff7ed;color:#c2410c;">
<div class="circle" style="background:#f97316;">1</div> A &amp; R
</div>

<div onclick="showSection('two',this)" class="tab-link" style="background:#dcfce7;color:#15803d;">
<div class="circle" style="background:#16a34a;">2</div>Marks
</div>

<div onclick="showSection('three',this)" class="tab-link" style="background:#fee2e2;color:#b91c1c;">
<div class="circle" style="background:#dc2626;">3</div>Marks
</div>

<div onclick="showSection('four',this)" class="tab-link" style="background:#e0e7ff;color:#3730a3;">
<div class="circle" style="background:#0ea5e9;">4</div>Marks
</div>

<div onclick="showSection('five',this)" class="tab-link" style="background:#fce7f3;color:#be185d;">
<div class="circle" style="background:#ec4899;">5</div>Marks
</div>

</div>

<!-- MCQ -->
<div id="mcq" class="section active"></div>

<!-- A&R -->
<div id="ar" class="section"></div>

<!-- 2 MARK -->
<div id="two" class="section"></div>

<!-- 3 MARK -->
<div id="three" class="section"></div>

<!-- 4 MARK -->
<div id="four" class="section"></div>

<!-- 5 MARK -->
<div id="five" class="section"></div>

</div>

<!-- Load section data -->
<script src="../sections/mcq.js"></script>
<script src="../sections/ar.js"></script>
<script src="../sections/two.js"></script>
<script src="../sections/three.js"></script>
<script src="../sections/four.js"></script>
<script src="../sections/five.js"></script>

<script>

/* ---- RENDER MCQ ---- */
mcqQuestions.forEach(q => {
  const card = document.createElement('div');
  card.className = 'mcq-card';
  const badgesHTML = (q.set ? `<div class="set-badge">${q.set}</div>` : '') +
                     `<div class="year-badge">${q.year}</div>`;
  const optsHTML = Object.entries(q.options).map(([k,v]) =>
    `<div class="option" data-opt="${k}"><span class="opt-label">${k}</span>${v}</div>`
  ).join('');
  card.innerHTML = `
    <div class="qno mcq"></div>
    <div style="flex:1">
      ${q.question}
      <div class="options" data-answer="${q.answer}">${optsHTML}</div>
      <div class="explanation">Explanation will be updated shortly</div>
    </div>
    <div style="display:flex;gap:6px;margin-left:auto;">${badgesHTML}</div>
  `;
  document.getElementById('mcq').appendChild(card);
});

/* ---- RENDER A&R ---- */
arQuestions.forEach(q => {
  const card = document.createElement('div');
  card.className = 'mcq-card';
  const badgesHTML = (q.set ? `<div class="set-badge">${q.set}</div>` : '') +
                     `<div class="year-badge">${q.year}</div>`;
  card.innerHTML = `
    <div class="qno ar"></div>
    <div style="flex:1">
      <b>Assertion:</b> ${q.assertion}<br>
      <b>Reason:</b> ${q.reason}
      <div class="options ar" data-answer="${q.answer}">
        <div class="option" data-opt="A"><span class="opt-label">A</span></div>
        <div class="option" data-opt="B"><span class="opt-label">B</span></div>
        <div class="option" data-opt="C"><span class="opt-label">C</span></div>
        <div class="option" data-opt="D"><span class="opt-label">D</span></div>
      </div>
      <div class="explanation">Explanation will be updated shortly</div>
    </div>
    <div style="display:flex;gap:6px;margin-left:auto;">${badgesHTML}</div>
  `;
  document.getElementById('ar').appendChild(card);
});

/* ---- RENDER WRITTEN QUESTIONS (2M, 3M, 4M, 5M) ---- */
function renderWritten(data, sectionId, cls) {
  data.forEach(q => {
    const item = document.createElement('div');
    item.className = 'question-item';
    const badgesHTML = (q.set ? `<div class="set-badge">${q.set}</div>` : '') +
                       `<div class="year-badge">${q.year}</div>`;
    item.innerHTML = `
      <div class="qno ${cls}"></div>
      <div>
        ${q.question}
        <div class="explanation">Explanation will be updated shortly</div>
      </div>
      <div style="display:flex;gap:6px;margin-left:auto;">${badgesHTML}</div>
    `;
    document.getElementById(sectionId).appendChild(item);
  });
}

renderWritten(twoMarkQuestions,   'two',   'two');
renderWritten(threeMarkQuestions, 'three', 'three');
renderWritten(fourMarkQuestions,  'four',  'four');
renderWritten(fiveMarkQuestions,  'five',  'five');

/* ---- TAB SWITCH ---- */
function showSection(id, el) {
  document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
  document.querySelectorAll(".tab-link").forEach(tab => tab.classList.remove("active-tab"));
  document.getElementById(id).classList.add("active");
  el.classList.add("active-tab");
}

/* ---- MCQ CHECK ---- */
document.addEventListener('click', function(e) {
  const opt = e.target.closest('.option');
  if (!opt) return;
  const box = opt.closest('.options');
  if (!box || box.classList.contains('answered')) return;
  const correct = box.dataset.answer;
  const selected = opt.dataset.opt;
  box.classList.add('answered');
  if (selected === correct) {
    opt.classList.add('correct');
  } else {
    opt.classList.add('wrong');
    box.querySelector(`[data-opt="${correct}"]`).classList.add('correct');
  }
});

/* ---- EXPLANATION TOGGLE ---- */
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('option') || e.target.closest('.option')) return;
  const card = e.target.closest('.mcq-card, .question-item');
  if (!card) return;
  const exp = card.querySelector('.explanation');
  if (!exp) return;
  exp.style.display = exp.style.display === 'block' ? 'none' : 'block';
});

</script>

</body>
</html>
